name: Build & Deploy — Dev

on:
  push:
    branches:
      - develop

env:
  APP_VERSION: 1.0.0
  DOCKER_REGISTRY: ghcr.io
  DOCKER_USERNAME: zawthanoo
  DOCKER_IMAGE_NAME: keycloak-docker

jobs:
  dockr-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Bild tag version
        id: tag-version
        run: echo "version=${{ env.APP_VERSION }}-${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.tag-version.outputs.version }}
